<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Thank You | Elite Fire Protect Ltd</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.78)),
        url("hero-bg.webp") center center / cover no-repeat;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 30px;
      color: #fff;
    }

    .thank-you-box {
      background: rgba(10,10,10,0.88);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 55px 45px;
      max-width: 650px;
      width: 100%;
      text-align: center;
      border-radius: 6px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.45);

      opacity: 0;
      transform: translateY(35px);
      animation: reveal 0.8s ease forwards;
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tick {
      width: 90px;
      height: 90px;
      background: #9f1111;
      border-radius: 50%;
      margin: 0 auto 28px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 42px;
      font-weight: bold;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 18px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    p {
      color: #ddd;
      font-size: 17px;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .btn-home {
      display: inline-block;
      background: #9f1111;
      color: #fff;
      padding: 15px 32px;
      border-radius: 4px;
      font-weight: bold;
      text-decoration: none;
      transition: 0.25s ease;
    }

    .btn-home:hover {
      background: #750b0b;
      transform: translateY(-2px);
    }

    @media (max-width: 768px) {

      .thank-you-box {
        padding: 40px 25px;
      }

      h1 {
        font-size: 30px;
      }

      p {
        font-size: 16px;
      }

    }

  </style>

</head>

<body>

  <div class="thank-you-box">

    <div class="tick">✓</div>

    <h1>Thank You</h1>

    <p>
      Your enquiry has been successfully submitted.
      A member of the EliteFire Protect team will review your message
      and get back to you shortly.
    </p>

    <a href="index.html" class="btn-home">
      Return to Homepage
    </a>

  </div>

</body>
</html>
